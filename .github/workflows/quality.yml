name: Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.11", "3.14"]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Install prek
        run: uv tool install prek

      - name: Run quality gates
        run: prek run --all-files

      - name: Tests
        run: uv run pytest -m "not integration"

      - name: Cache pruning
        if: always()
        run: uv cache prune --ci

  integration:
    name: Integration tests
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.13"

      - name: Convert test model
        run: |
          uv run --isolated --python 3.13 \
            --with 'torch>=2.7,<2.8' \
            --with 'coremltools>=8.0' \
            --with numpy \
            --with 'transformers>=4.35,<4.46' \
            python scripts/convert_model.py \
            sshleifer/tiny-gpt2 .models/tiny-gpt2

      - name: Run integration tests
        run: |
          uv run --isolated --python 3.13 \
            --with 'coremltools>=8.0' \
            --with numpy \
            --with transformers \
            --with pytest \
            --with llm \
            pytest -m integration -v

      - name: Cache pruning
        if: always()
        run: uv cache prune --ci
